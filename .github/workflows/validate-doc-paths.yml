name: Validate docs references

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-doc-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Validate Rive docs source paths
        run: python3 scripts/validate_doc_paths.py

      - name: Validate tool context sync
        run: python3 scripts/validate_tool_context_sync.py
