name: Validate docs references

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-doc-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Validate Rive docs source paths
        run: python3 scripts/validate_doc_paths.py
