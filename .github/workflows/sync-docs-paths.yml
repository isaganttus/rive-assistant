name: Sync Rive docs paths

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  check-paths:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Fetch latest docs.json
        run: |
          curl -sf https://raw.githubusercontent.com/rive-app/rive-docs/main/docs.json \
            -o /tmp/docs-latest.json || exit 1

      - name: Extract page paths
        run: |
          python3 - <<'EOF' > /tmp/paths-latest.txt
          import json, sys

          def extract(obj):
              if isinstance(obj, str):
                  yield obj
              elif isinstance(obj, list):
                  for item in obj:
                      yield from extract(item)
              elif isinstance(obj, dict):
                  if "page" in obj:
                      yield obj["page"]
                  if "pages" in obj:
                      yield from extract(obj["pages"])
                  for key, val in obj.items():
                      if key not in ("page", "pages") and isinstance(val, (dict, list)):
                          yield from extract(val)

          with open("/tmp/docs-latest.json") as f:
              data = json.load(f)

          paths = sorted(set(extract(data)))
          print("\n".join(paths))
          EOF

      - name: Compare with stored paths
        id: compare
        run: |
          if diff docs-paths.txt /tmp/paths-latest.txt > /tmp/paths-diff.txt 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            cat /tmp/paths-diff.txt
          fi

      - name: Update stored paths file
        if: steps.compare.outputs.changed == 'true'
        run: cp /tmp/paths-latest.txt docs-paths.txt

      - name: Read diff for PR body
        if: steps.compare.outputs.changed == 'true'
        id: diff
        run: |
          DIFF=$(cat /tmp/paths-diff.txt)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Open PR
        if: steps.compare.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f  # v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/docs-paths
          base: main
          commit-message: "Update docs-paths.txt from rive-app/rive-docs"
          title: "Rive docs structure changed — review routing table"
          body: |
            The official [rive-app/rive-docs](https://github.com/rive-app/rive-docs) repository has changed its page structure.

            Review the diff below and update the routing table in `CLAUDE.md` if any paths referenced there have been renamed or removed.

            <details>
            <summary>Path diff</summary>

            ```diff
            ${{ steps.diff.outputs.content }}
            ```

            </details>

            Lines starting with `-` were removed from the docs. Lines starting with `+` were added.
